spring.data.mongodb.database=Archimedes
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017

# KMP client contract: controllers return JSON-serialized DTOs but declare no explicit
# `produces`, so springdoc defaults the 200 response media type to `*/*`. kmpgen only maps
# a typed model for `application/json`, generating untyped HttpResponse otherwise. Force the
# default so every response deserializes to its DTO in the generated client.
springdoc.default-produces-media-type=application/json
